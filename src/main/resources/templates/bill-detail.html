<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="container">
<h1 class="text-center">Form drink</h1>
<form action="/bill/update-bill" method="post" class="container mt-4 p-4">

    <div class="row mb-3">
        <label class="col-4 col-form-label">Id</label>
        <div class="col-8">
            <input type="text" name="id" th:value="${b.id}" readonly class="form-control">
        </div>
    </div>

    <div class="row mb-3">
        <label class="col-4 col-form-label">Code</label>
        <div class="col-8">
            <input type="text" name="code" th:value="${b.code}" class="form-control">
        </div>
    </div>

    <div class="row mb-3">
        <label class="col-4 col-form-label">Created_At</label>
        <div class="col-8">
            <input type="date" name="createdAt" th:value="${b.createdAt}" class="form-control">
        </div>
    </div>

    <div class="row mb-3">
        <label class="col-4 col-form-label">Total</label>
        <div class="col-8">
            <input type="number" name="total" th:value="${b.total}" class="form-control">
        </div>
    </div>

    <div class="row mb-3">
        <label class="col-4 col-form-label">Status</label>
        <div class="col-8">
            <select name="status" class="form-select">
                <option value="PENDING" th:selected="${b?.status == 'PENDING'}">PENDING</option>
                <option value="PAID" th:selected="${b?.status == 'PAID'}">PAID</option>
                <option value="CANCEL" th:selected="${b?.status == 'CANCEL'}">CANCEL</option>
            </select>
        </div>
    </div>

    <div class="row mb-3">
        <label class="col-4 col-form-label">User</label>
        <div class="col-8">
            <select name="user" class="form-select">
                <option th:each="u : ${users}"
                        th:value="${u.id}"
                        th:text="${u.fullname}"
                        th:selected="${u.id == b.user?.id}">
                </option>
            </select>
        </div>
    </div>

    <div class="mt-3">
        <button class="btn btn-outline-dark">Update</button>
        <a href="/bill/show?page=0" class="btn btn-outline-secondary">Back</a>
    </div>

</form>
<table class="table table-hover mb-5">
    <thead>
    <tr>
        <th>Id</th>
        <th>Code</th>
        <th>Created_At</th>
        <th>Total</th>
        <th>Status</th>
        <th>User</th>
        <th>Action</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="b : ${bills}">
        <td th:text="${b.id}"></td>
        <td th:text="${b.code}"></td>
        <td th:text="${b.createdAt}"></td>
        <td th:text="${b.total}"></td>
        <td th:text="${b.status}"></td>
        <td th:text="${b.user?.fullname}"></td>
        <td>
            <a th:href="@{|/bill/detail-bill?id=${b.id}|}" class="btn btn-outline-dark">Detail</a>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
