<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>hihi</title>
</head>
<body>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<h1 class="container text-center">Login Form Hihi</h1>
<div class="container d-flex justify-content-center align-items-center" style="min-height: 50vh;">
    <div class="card shadow-sm p-4" style="width: 100%; max-width: 400px;">
        <h3 class="text-center mb-4 text-danger">Đăng Nhập</h3>
        <form action="/login" method="post">
            <div class="mb-3">
                <label class="form-label">Tên đăng nhập:</label>
                <input type="text" name="username" class="form-control" placeholder="Nhập username..." required>
            </div>
            <div class="mb-3">
                <label class="form-label">Mật khẩu:</label>
                <input type="text" name="password" class="form-control" placeholder="Nhập password..." required>
            </div>
            <div class="d-grid gap-2">
                <button class="btn btn-danger" type="submit">Xác nhận</button>
            </div>
        </form>
    </div>
</div>
</body>
</html>
