<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
<h1>HomePage</h1>
<p>Ho va ten: <label th:text="${name}"></label></p>
<p>Lop: <label th:text="${lop}"></label></p>
<p>Tuoi: <label th:text="${tuoi}"></label></p>

<h1>Danh sách</h1>
<table class="table table-hover">
    <thead>
    <tr>
        <th>ID</th>
        <th>email</th>
        <th>password</th>
        <th>fullname</th>
        <th>phone</th>
        <th>role</th>
        <th>active</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="user : ${users}">
        <td th:text="${user.id}"></td>
        <td th:text="${user.email}"></td>
        <td th:text="${user.password}"></td>
        <td th:text="${user.fullname}"></td>
        <td th:text="${user.phone}"></td>
        <td th:text="${user.role ? 'admin':'user'}"></td>
        <td th:text="${user.active ? 'Hoạt động':'Ngừng hoạt động'}"></td>
    </tr>
    </tbody>
</table>

<h1>Danh sach nhan vien</h1>
<table class="table table-dark table-striped">
    <thead>
    <tr>
        <th>ID</th>
        <th>email</th>
        <th>password</th>
        <th>fullname</th>
        <th>luong</th>
        <th>dia chi</th>
        <th>active</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="nv : ${lstNhanVien}">
        <td th:text="${nv.id}"></td>
        <td th:text="${nv.email}"></td>
        <td th:text="${nv.password}"></td>
        <td th:text="${nv.fullname}"></td>
        <td th:text="${nv.luong}"></td>
        <td th:text="${nv.diaChi}"></td>
        <td th:text="${nv.active ? 'Còn làm' : 'Nghỉ làm'}"></td>
    </tr>
    </tbody>
</table>
</body>
</html>
